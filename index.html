<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>荒村求生</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div id="time-info">
        <span id="day-display">第 1 天</span>
        <span id="hour-display">06:00</span>
        <span id="phase-display">秋末</span>
      </div>
      <div id="controls">
        <span id="llm-badge">--</span>
        <button id="btn-pause">▶</button>
        <button id="btn-speed">1x</button>
      </div>
    </header>

    <div id="timeline-bar">
      <div id="timeline-nodes"></div>
      <span id="timeline-label">06:00</span>
    </div>

    <main id="world">
      <div class="location-card" data-id="square">
        <h3 class="loc-name">广场</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="chapel">
        <h3 class="loc-name">废弃教堂</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="forge">
        <h3 class="loc-name">旧铁匠铺</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="ruins">
        <h3 class="loc-name">废屋区</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="forest">
        <h3 class="loc-name">森林</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="storehouse">
        <h3 class="loc-name">储藏室</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
    </main>

    <div id="dialogue-panel">
      <div id="dialogue-content"></div>
    </div>

    <footer id="event-log">
      <div id="log-content"></div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
