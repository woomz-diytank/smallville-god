<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>荒村求生</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div id="time-info">
        <span id="day-display">第 1 天</span>
        <span id="hour-display">06:00</span>
        <span id="phase-display">秋末</span>
      </div>
      <div id="controls">
        <span id="llm-badge">--</span>
        <button id="btn-pause">▶</button>
        <button id="btn-speed">1x</button>
        <button id="btn-download-log" title="下载当前运行日志">LOG</button>
        <button id="btn-download-prev" title="下载上次运行日志" style="display:none">PREV</button>
      </div>
    </header>

    <div id="timeline-bar">
      <div id="timeline-nodes"></div>
      <span id="timeline-label">06:00</span>
    </div>

    <main id="world">
      <div class="location-card" data-id="camp">
        <h3 class="loc-name">营地</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="forest">
        <h3 class="loc-name">森林</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="ruins">
        <h3 class="loc-name">废屋</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="storehouse">
        <h3 class="loc-name">储藏室</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="house_agnes">
        <h3 class="loc-name">阿格尼丝的屋子</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="house_roderic">
        <h3 class="loc-name">罗德里克的屋子</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="house_oskar">
        <h3 class="loc-name">奥斯卡的屋子</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="workshop">
        <h3 class="loc-name">工坊</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="smokehouse">
        <h3 class="loc-name">烟熏房</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
      <div class="location-card" data-id="shrine">
        <h3 class="loc-name">神龛</h3>
        <div class="loc-npcs"></div>
        <div class="loc-items"></div>
      </div>
    </main>

    <div id="dialogue-panel">
      <div id="dialogue-content"></div>
    </div>

    <footer id="event-log">
      <div id="log-content"></div>
    </footer>
  </div>

  <div id="npc-panel-overlay" class="hidden">
    <div id="npc-panel">
      <div id="npc-panel-header">
        <span id="npc-panel-name"></span>
        <span id="npc-panel-age"></span>
      </div>
      <div id="npc-panel-stats"></div>
      <div id="npc-panel-goals"></div>
      <div id="npc-panel-learning"></div>
      <div id="npc-panel-skills"></div>
      <div id="npc-panel-bg"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
